<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Phase 11 Cycle 2 — 무기 레벨업 이펙트 스케일업</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0f17; font-family:'JetBrains Mono',monospace; color:#cdd6f4; padding:20px; }
h1 { font-size:13px; color:#6c7086; letter-spacing:2px; margin-bottom:4px; text-transform:uppercase; }
.sub { font-size:10px; color:#45475a; margin-bottom:20px; }
.panels { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.panel { background:#1e1e2e; border:1px solid #313244; border-radius:4px; overflow:hidden; }
.panel-header { background:#181825; padding:6px 12px; border-bottom:1px solid #313244; display:flex; align-items:center; justify-content:space-between; }
.panel-title { font-size:10px; color:#cdd6f4; }
.lv-badge { font-size:9px; font-weight:700; padding:2px 8px; border-radius:2px; }
canvas { display:block; }
.panel-desc { padding:8px 12px; font-size:8px; color:#6c7086; border-top:1px solid #313244; line-height:1.7; }
</style>
</head>
<body>
<h1>Phase 11 · Cycle 2 — 무기 레벨업 이펙트 스케일업</h1>
<p class="sub">레벨에 따라 파티클 수·크기·글로우·색상 복잡도 증가</p>

<div class="panels">

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Python.py</span>
      <span class="lv-badge" style="background:rgba(78,201,176,0.15);color:#4ec9b0">Lv 1</span>
    </div>
    <canvas id="c1" width="280" height="200"></canvas>
    <div class="panel-desc">
      trail 점 5개 · 글로우 없음<br>기본 네온 그린 단색
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Python.py</span>
      <span class="lv-badge" style="background:rgba(166,227,161,0.15);color:#a6e3a1">Lv 3</span>
    </div>
    <canvas id="c2" width="280" height="200"></canvas>
    <div class="panel-desc">
      trail 점 12개 · shadowBlur 10<br>사인파 구불구불 효과
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Python.py</span>
      <span class="lv-badge" style="background:rgba(249,226,175,0.15);color:#f9e2af">Lv 5 MAX</span>
    </div>
    <canvas id="c3" width="280" height="200"></canvas>
    <div class="panel-desc">
      trail 점 20개 · shadowBlur 20 · 색상 그라데이션<br>꼬리 스플래시 파티클 추가
    </div>
  </div>

</div>

<script>
const BG = '#0f0f17';

class Projectile {
  constructor(x, y, angle, speed) {
    this.x = x; this.y = y;
    this.angle = angle; this.speed = speed;
    this.trail = [];
  }
  update(w, h) {
    this.trail.push({x:this.x, y:this.y});
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    if(this.x<0||this.x>w||this.y<0||this.y>h) {
      this.x = w/2; this.y = h/2;
      this.trail = [];
    }
  }
}

function spawnProjectiles(cx, cy, count) {
  return Array.from({length:count}, (_,i) => {
    const angle = (i/count)*Math.PI*2;
    return new Projectile(cx,cy,angle,1.5);
  });
}

function drawLv1(ctx, projs, t) {
  const TRAIL = 5;
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,280,200);
  projs.forEach(p => {
    p.update(280,200);
    if(p.trail.length>TRAIL) p.trail.shift();
    p.trail.forEach((pt,i) => {
      const a = i/TRAIL;
      ctx.beginPath();
      ctx.arc(pt.x,pt.y,2,0,Math.PI*2);
      ctx.fillStyle = `rgba(68,255,68,${a*0.6})`;
      ctx.fill();
    });
    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle = '#44ff44';
    ctx.fill();
  });
}

function drawLv3(ctx, projs, t) {
  const TRAIL = 12;
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,280,200);
  projs.forEach(p => {
    p.update(280,200);
    if(p.trail.length>TRAIL) p.trail.shift();
    p.trail.forEach((pt,i) => {
      const a = i/TRAIL;
      const wave = Math.sin(t*0.05 + i*0.5)*3;
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#44ff44';
      ctx.beginPath();
      ctx.arc(pt.x+wave,pt.y+wave,2.5,0,Math.PI*2);
      ctx.fillStyle = `rgba(68,255,68,${a*0.8})`;
      ctx.fill();
    });
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle = '#88ffaa';
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawLv5(ctx, projs, t, splashes) {
  const TRAIL = 20;
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,280,200);

  // splash particles
  splashes.forEach((s,i) => {
    s.life -= 0.02;
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.05;
    if(s.life > 0) {
      ctx.beginPath();
      ctx.arc(s.x,s.y,1.5,0,Math.PI*2);
      ctx.fillStyle = `rgba(136,255,170,${s.life})`;
      ctx.shadowBlur = 6; ctx.shadowColor='#44ff44';
      ctx.fill(); ctx.shadowBlur=0;
    }
  });
  // remove dead
  for(let i=splashes.length-1;i>=0;i--) if(splashes[i].life<=0) splashes.splice(i,1);

  projs.forEach(p => {
    const wasX = p.x, wasY = p.y;
    p.update(280,200);
    if(p.trail.length>TRAIL) p.trail.shift();

    // grad trail
    p.trail.forEach((pt,i) => {
      const a = i/TRAIL;
      const wave = Math.sin(t*0.08 + i*0.4)*4;
      const hue = 120 + i*3;
      ctx.shadowBlur = 20; ctx.shadowColor='#44ff44';
      ctx.beginPath();
      ctx.arc(pt.x+wave,pt.y,3,0,Math.PI*2);
      ctx.fillStyle = `hsla(${hue},100%,60%,${a})`;
      ctx.fill();
    });
    ctx.shadowBlur = 25;
    ctx.beginPath();
    ctx.arc(p.x,p.y,5,0,Math.PI*2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.shadowBlur = 0;

    // random splash
    if(Math.random()<0.3) {
      for(let k=0;k<2;k++) splashes.push({
        x:p.x, y:p.y,
        vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2,
        life:0.8+Math.random()*0.4
      });
    }
  });
}

const c1 = document.getElementById('c1'), ctx1=c1.getContext('2d');
const c2 = document.getElementById('c2'), ctx2=c2.getContext('2d');
const c3 = document.getElementById('c3'), ctx3=c3.getContext('2d');
const p1 = spawnProjectiles(140,100,5);
const p2 = spawnProjectiles(140,100,5);
const p3 = spawnProjectiles(140,100,5);
const splashes = [];
let t=0;
function loop() {
  t++;
  drawLv1(ctx1,p1,t);
  drawLv3(ctx2,p2,t);
  drawLv5(ctx3,p3,t,splashes);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
