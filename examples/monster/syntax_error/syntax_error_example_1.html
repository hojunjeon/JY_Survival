<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SyntaxError - Design 1 | JY Survival</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0008;color:#fff;font-family:'Space Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
  h1{font-family:'Orbitron',sans-serif;font-size:2rem;color:#ff2200;text-shadow:0 0 20px #ff220088;margin-bottom:4px;letter-spacing:4px}
  .subtitle{color:#ff6644;font-size:.75rem;letter-spacing:3px;margin-bottom:24px}
  .stage{position:relative;width:420px;height:320px;background:#110006;border:2px solid #ff220044;border-radius:12px;overflow:hidden;box-shadow:0 0 40px #ff220033}
  canvas{display:block;margin:auto}
  .grid-line{position:absolute;inset:0;background-image:linear-gradient(#ff220009 1px,transparent 1px),linear-gradient(90deg,#ff220009 1px,transparent 1px);background-size:32px 32px}
  .stats{display:flex;gap:20px;margin-top:16px;font-size:.72rem;color:#ff8866}
  .stat{background:#1a0008;border:1px solid #ff220033;border-radius:6px;padding:8px 14px;text-align:center}
  .stat span{display:block;color:#ff2200;font-size:1.1rem;font-weight:700;font-family:'Orbitron',sans-serif}
  .special-box{margin-top:14px;width:420px;background:#1a0008;border:1px solid #ff220044;border-radius:8px;padding:14px 18px;font-size:.72rem;line-height:1.7;color:#ffaa99}
  .special-box h3{color:#ff4422;font-family:'Orbitron',sans-serif;font-size:.8rem;margin-bottom:6px;letter-spacing:2px}
  .btn{margin-top:12px;padding:10px 28px;background:#ff2200;color:#fff;font-family:'Space Mono',monospace;font-size:.8rem;border:none;border-radius:6px;cursor:pointer;letter-spacing:2px;box-shadow:0 0 16px #ff220066;transition:all .2s}
  .btn:hover{background:#ff4422;box-shadow:0 0 28px #ff2200aa;transform:scale(1.05)}
  .tag{display:inline-block;background:#ff220022;color:#ff4422;font-size:.65rem;padding:2px 8px;border-radius:20px;border:1px solid #ff220055;margin-bottom:8px;letter-spacing:2px}
</style>
</head>
<body>
<p class="tag">DESIGN 1 / AGGRESSIVE SPIKY</p>
<h1>SYNTAX ERROR</h1>
<p class="subtitle">// 기본 버그 · 빨간 각진 딱정벌레형</p>
<div class="stage">
  <div class="grid-line"></div>
  <canvas id="c" width="420" height="320"></canvas>
</div>
<div class="stats">
  <div class="stat">HP<span>24</span></div>
  <div class="stat">SPD<span>65</span></div>
  <div class="stat">DMG<span>10</span></div>
  <div class="stat">TYPE<span style="font-size:.65rem">CONTACT</span></div>
</div>
<div class="special-box">
  <h3>⚡ SPECIAL: NONE</h3>
  플레이어를 향해 직진 돌격. 날카로운 가시 돌기와 전기 방전으로 접촉 시 데미지.<br>
  <strong>패턴:</strong> 적발 즉시 최단 경로 추적. 경로 예측 없음. 단순하지만 집요하게 붙어다님.
</div>
<button class="btn" id="btn">⚡ 돌격 시뮬레이션</button>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=420,H=320;
let t=0,sparks=[],charging=false,chargeT=0,px=340,py=160;

// 픽셀 아트 (16×16, 1px = 10px on canvas)
const _ = null, R='#cc1100', BR='#ff3311', DR='#881100', OR='#ff6633', W2='#ffffff', Y='#ffee00', DK='#440000';
const SPRITE = [
  [_,_,_,_,DR,DR,_,_,_,_,DR,DR,_,_,_,_],
  [_,_,_,DR,R,R,DR,_,DR,R,R,DR,_,_,_,_],
  [_,_,DR,R,BR,BR,R,DR,R,BR,BR,R,DR,_,_,_],
  [_,DR,R,BR,Y,Y,BR,BR,BR,Y,Y,BR,R,DR,_,_],
  [DR,R,BR,Y,W2,W2,Y,BR,Y,W2,W2,Y,BR,R,DR,_],
  [DR,R,BR,Y,W2,W2,Y,OR,Y,W2,W2,Y,BR,R,DR,_],
  [DR,R,BR,BR,Y,Y,BR,BR,BR,Y,Y,BR,BR,R,DR,_],
  [_,DR,R,R,BR,OR,OR,OR,OR,BR,R,R,DR,_,_,_],
  [_,_,DR,R,R,OR,BR,BR,OR,R,R,DR,_,_,_,_],
  [_,DR,R,R,OR,BR,R,R,BR,OR,R,R,DR,_,_,_],
  [DR,R,OR,BR,R,DR,_,_,DR,R,BR,OR,R,DR,_,_],
  [DR,R,R,DR,_,_,_,_,_,_,DR,R,R,DR,_,_],
  [_,DR,_,_,_,_,_,_,_,_,_,_,DR,_,_,_],
  [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
];

let mx=210,my=160,vx=0,vy=0;

function drawSprite(x,y,scale,glow){
  if(glow){
    ctx.save();
    ctx.shadowColor='#ff2200';
    ctx.shadowBlur=20;
  }
  for(let r=0;r<SPRITE.length;r++){
    for(let c=0;c<SPRITE[r].length;c++){
      const col=SPRITE[r][c];
      if(!col)continue;
      ctx.fillStyle=col;
      ctx.fillRect(x+c*scale,y+r*scale,scale,scale);
    }
  }
  if(glow)ctx.restore();
}

function spawnSparks(sx,sy){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2;
    sparks.push({x:sx,y:sy,vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4),life:1,maxLife:1});
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // bg glow
  const g=ctx.createRadialGradient(mx,my,10,mx,my,120);
  g.addColorStop(0,'#ff110022');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // player marker
  ctx.save();
  ctx.globalAlpha=0.5;
  ctx.fillStyle='#4a90d9';
  ctx.beginPath();ctx.arc(px,py,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('JY',px,py);
  ctx.restore();

  // sparks
  sparks=sparks.filter(s=>s.life>0);
  sparks.forEach(s=>{
    s.x+=s.vx;s.y+=s.vy;s.life-=0.04;
    const a=s.life/s.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=`hsl(${20+Math.random()*20},100%,60%)`;
    ctx.fillRect(s.x-2,s.y-2,4,4);
    ctx.globalAlpha=1;
  });

  // electric arcs along path
  if(charging){
    ctx.save();ctx.globalAlpha=0.3;ctx.strokeStyle='#ff4422';ctx.lineWidth=1;
    ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(mx+10,my+8);ctx.lineTo(px,py);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }

  // sprite bob
  const bob=Math.sin(t*3)*4;
  const s=14;
  const sx=mx-s*8,sy=my-s*8+bob;
  drawSprite(sx,sy,s,true);

  // charging flash
  if(charging){
    const p=chargeT/0.5;
    ctx.save();ctx.globalAlpha=p*0.4;
    ctx.fillStyle='#ff3300';
    ctx.beginPath();ctx.arc(mx,my,80*p,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // label
  ctx.fillStyle='#ff4422';ctx.font='bold 11px monospace';ctx.textAlign='center';
  ctx.fillText('SyntaxError',mx,my-90+bob);
}

function update(dt){
  t+=dt;
  // idle float toward player slowly
  const dx=px-mx,dy=py-my,dist=Math.sqrt(dx*dx+dy*dy);
  if(!charging&&dist>60){
    mx+=dx/dist*65*dt;my+=dy/dist*65*dt;
  }
  if(charging){
    chargeT+=dt;
    mx+=vx*dt;my+=vy*dt;
    if(chargeT>0.5){
      charging=false;chargeT=0;
      spawnSparks(mx,my);
    }
  }
  // idle sparks
  if(Math.random()<0.05)spawnSparks(mx+(-30+Math.random()*60),my+(-30+Math.random()*60));
}

document.getElementById('btn').addEventListener('click',()=>{
  if(charging)return;
  const dx=px-mx,dy=py-my,dist=Math.sqrt(dx*dx+dy*dy);
  vx=dx/dist*300;vy=dy/dist*300;
  charging=true;chargeT=0;
  spawnSparks(mx,my);
});

let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.05);last=ts;
  update(dt);draw();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body></html>
