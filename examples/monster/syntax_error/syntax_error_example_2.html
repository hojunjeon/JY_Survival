<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SyntaxError - Design 2 | JY Survival</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0008;color:#fff;font-family:'Space Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
  h1{font-family:'Orbitron',sans-serif;font-size:2rem;color:#ff2200;text-shadow:0 0 20px #ff220088;margin-bottom:4px;letter-spacing:4px}
  .subtitle{color:#ff6644;font-size:.75rem;letter-spacing:3px;margin-bottom:24px}
  .stage{position:relative;width:420px;height:320px;background:#110006;border:2px solid #ff220044;border-radius:12px;overflow:hidden;box-shadow:0 0 40px #ff220033}
  canvas{display:block;margin:auto}
  .stats{display:flex;gap:20px;margin-top:16px;font-size:.72rem;color:#ff8866}
  .stat{background:#1a0008;border:1px solid #ff220033;border-radius:6px;padding:8px 14px;text-align:center}
  .stat span{display:block;color:#ff2200;font-size:1.1rem;font-weight:700;font-family:'Orbitron',sans-serif}
  .special-box{margin-top:14px;width:420px;background:#1a0008;border:1px solid #ff220044;border-radius:8px;padding:14px 18px;font-size:.72rem;line-height:1.7;color:#ffaa99}
  .special-box h3{color:#ff4422;font-family:'Orbitron',sans-serif;font-size:.8rem;margin-bottom:6px;letter-spacing:2px}
  .btn{margin-top:12px;padding:10px 28px;background:#ff2200;color:#fff;font-family:'Space Mono',monospace;font-size:.8rem;border:none;border-radius:6px;cursor:pointer;letter-spacing:2px;box-shadow:0 0 16px #ff220066;transition:all .2s}
  .btn:hover{background:#ff4422;box-shadow:0 0 28px #ff2200aa;transform:scale(1.05)}
  .tag{display:inline-block;background:#ff220022;color:#ff4422;font-size:.65rem;padding:2px 8px;border-radius:20px;border:1px solid #ff220055;margin-bottom:8px;letter-spacing:2px}
</style>
</head>
<body>
<p class="tag">DESIGN 2 / GLITCH BLOB</p>
<h1>SYNTAX ERROR</h1>
<p class="subtitle">// 글리치 에러 클라우드형 · 코드 텍스트 방출</p>
<div class="stage">
  <canvas id="c" width="420" height="320"></canvas>
</div>
<div class="stats">
  <div class="stat">HP<span>24</span></div>
  <div class="stat">SPD<span>65</span></div>
  <div class="stat">DMG<span>10</span></div>
  <div class="stat">TYPE<span style="font-size:.65rem">CONTACT</span></div>
</div>
<div class="special-box">
  <h3>💥 SPECIAL: GLITCH BURST</h3>
  에러 텍스트 파편을 사방으로 분출하며 글리치 형태 변환. 접촉 시 코드가 깨지는 이펙트 발생.<br>
  <strong>특징:</strong> 몸통이 끊임없이 글리치하며 모양이 변형됨. 에러 메시지가 표면에 출력됨.
</div>
<button class="btn" id="btn">💥 글리치 버스트</button>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=420,H=320;
let t=0,particles=[],glitching=false,glitchT=0;
let mx=180,my=160;
const px=340,py=160;

const ERRORS=['SyntaxError','undefined','NaN','null','{?}','>>>','^^^','!!','ERR','///'];
let floatTexts=[];

function spawnFloatText(){
  floatTexts.push({
    text:ERRORS[Math.floor(Math.random()*ERRORS.length)],
    x:mx+(-60+Math.random()*120),
    y:my+(-50+Math.random()*100),
    vx:(-1+Math.random()*2)*30,
    vy:-20-Math.random()*30,
    life:1,alpha:1,
    size:8+Math.random()*8
  });
}

function spawnParticles(){
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2;
    const spd=50+Math.random()*150;
    particles.push({x:mx,y:my,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,size:4+Math.random()*8,color:`hsl(${Math.random()*30},100%,${50+Math.random()*20}%)`});
  }
}

function drawBlob(x,y,r,phase){
  const pts=10;
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
    const a=i/pts*Math.PI*2;
    const nz=Math.sin(a*3+phase)*0.25+Math.cos(a*2-phase*1.3)*0.15;
    const rr=r*(1+nz);
    const gx=x+Math.cos(a)*rr,gy=y+Math.sin(a)*rr;
    i===0?ctx.moveTo(gx,gy):ctx.lineTo(gx,gy);
  }
  ctx.closePath();
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // bg gradient
  const bg=ctx.createRadialGradient(mx,my,20,mx,my,160);
  bg.addColorStop(0,'#220008');bg.addColorStop(1,'#0a0008');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // scanlines
  ctx.save();ctx.globalAlpha=0.04;
  for(let y=0;y<H;y+=4){ctx.fillStyle='#000';ctx.fillRect(0,y,W,2);}
  ctx.restore();

  // outer glow
  const og=ctx.createRadialGradient(mx,my,40,mx,my,110);
  og.addColorStop(0,'#ff220033');og.addColorStop(1,'transparent');
  ctx.fillStyle=og;ctx.fillRect(0,0,W,H);

  // main body - layered blobs
  ctx.save();
  if(glitching){
    ctx.translate((-2+Math.random()*4),0);
    ctx.globalAlpha=0.9;
  }
  
  // shadow blob
  drawBlob(mx+4,my+6,50,t*1.2);
  ctx.fillStyle='#440000';ctx.fill();
  
  // main blob
  drawBlob(mx,my,50,t*1.2);
  const grad=ctx.createRadialGradient(mx-15,my-15,5,mx,my,55);
  grad.addColorStop(0,'#ff3322');grad.addColorStop(0.5,'#cc1100');grad.addColorStop(1,'#880011');
  ctx.fillStyle=grad;ctx.fill();
  
  // highlight blob
  drawBlob(mx,my,50,t*1.2);
  ctx.strokeStyle='#ff6644';ctx.lineWidth=2;
  ctx.globalAlpha=0.6;ctx.stroke();
  
  // inner shine
  drawBlob(mx-12,my-14,18,t*0.8);
  ctx.fillStyle='rgba(255,100,80,0.25)';ctx.fill();
  ctx.restore();

  // glitch slices
  if(glitching){
    ctx.save();
    for(let i=0;i<5;i++){
      const gy=my-40+Math.random()*80;
      const gh=3+Math.random()*8;
      const shift=-15+Math.random()*30;
      ctx.drawImage(cv,mx-60,gy,120,gh,mx-60+shift,gy,120,gh);
    }
    ctx.restore();
  }

  // eyes
  const eyeOff=glitching?(-3+Math.random()*6):0;
  ctx.fillStyle='#ffee00';
  ctx.beginPath();ctx.ellipse(mx-14+eyeOff,my-8,8,10,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(mx+14-eyeOff,my-8,8,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(mx-14+eyeOff,my-8,4,6,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(mx+14-eyeOff,my-8,4,6,0,0,Math.PI*2);ctx.fill();

  // mouth / error mark
  ctx.fillStyle='#ffcc00';ctx.font='bold 14px monospace';ctx.textAlign='center';
  ctx.fillText('!!',mx,my+20);

  // particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx*0.016;p.y+=p.vy*0.016;p.life-=0.025;p.vx*=0.95;p.vy*=0.95;
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    ctx.globalAlpha=1;
  });

  // floating error texts
  floatTexts=floatTexts.filter(f=>f.life>0);
  floatTexts.forEach(f=>{
    f.x+=f.vx*0.016;f.y+=f.vy*0.016;f.life-=0.02;
    ctx.globalAlpha=f.life;
    ctx.fillStyle='#ff4422';ctx.font=`${f.size}px monospace`;ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
    ctx.globalAlpha=1;
  });

  // player marker
  ctx.save();ctx.globalAlpha=0.6;ctx.fillStyle='#4a90d9';
  ctx.beginPath();ctx.arc(px,py,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('JY',px,py);ctx.restore();

  // label
  ctx.fillStyle='#ff4422aa';ctx.font='11px monospace';ctx.textAlign='center';
  ctx.fillText('SyntaxError',mx,my-68);
}

function update(dt){
  t+=dt;
  if(!glitching){
    const dx=px-mx,dy=py-my,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>65){mx+=dx/dist*65*dt;my+=dy/dist*65*dt;}
  }
  if(glitching){
    glitchT+=dt;
    if(glitchT>0.5){glitching=false;glitchT=0;}
  }
  if(Math.random()<0.03)spawnFloatText();
  if(glitching&&Math.random()<0.3)spawnParticles();
}

document.getElementById('btn').addEventListener('click',()=>{
  glitching=true;glitchT=0;
  spawnParticles();spawnFloatText();
});

let last=0;
function loop(ts){const dt=Math.min((ts-last)/1000,0.05);last=ts;update(dt);draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
</body></html>
