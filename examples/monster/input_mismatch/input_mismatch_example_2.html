<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>InputMismatch - Design 2 | JY Survival</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0014;color:#fff;font-family:'Space Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
  h1{font-family:'Orbitron',sans-serif;font-size:1.9rem;color:#cc66ff;text-shadow:0 0 20px #cc66ff88;margin-bottom:4px;letter-spacing:3px}
  .subtitle{color:#663388;font-size:.73rem;letter-spacing:3px;margin-bottom:20px}
  .stage{width:420px;height:300px;background:#0a0014;border:2px solid #cc66ff44;border-radius:12px;overflow:hidden;box-shadow:0 0 40px #cc66ff22}
  canvas{display:block}
  .stats{display:flex;gap:14px;margin-top:14px;font-size:.7rem;color:#bb99dd}
  .stat{background:#110020;border:1px solid #cc66ff33;border-radius:6px;padding:7px 12px;text-align:center}
  .stat span{display:block;color:#cc66ff;font-size:1rem;font-weight:700;font-family:'Orbitron',sans-serif}
  .special-box{margin-top:12px;width:420px;background:#110020;border:1px solid #cc66ff44;border-radius:8px;padding:12px 16px;font-size:.7rem;line-height:1.7;color:#ccbbdd}
  .special-box h3{color:#cc66ff;font-family:'Orbitron',sans-serif;font-size:.78rem;margin-bottom:6px;letter-spacing:2px}
  .btn{margin-top:10px;padding:9px 26px;background:#440066;color:#fff;font-family:'Space Mono',monospace;font-size:.78rem;border:none;border-radius:6px;cursor:pointer;letter-spacing:2px;box-shadow:0 0 16px #cc66ff33;transition:all .2s}
  .btn:hover{background:#660088;transform:scale(1.05)}
  .tag{display:inline-block;background:#cc66ff22;color:#cc66ff;font-size:.65rem;padding:2px 8px;border-radius:20px;border:1px solid #cc66ff55;margin-bottom:8px;letter-spacing:2px}
</style>
</head>
<body>
<p class="tag">DESIGN 2 / REVERSED JESTER</p>
<h1>INPUT MISMATCH</h1>
<p class="subtitle">// 역전 광대 · 반전 심볼 크리처</p>
<div class="stage"><canvas id="c" width="420" height="300"></canvas></div>
<div class="stats">
  <div class="stat">HP<span>28</span></div>
  <div class="stat">SPD<span>60</span></div>
  <div class="stat">DMG<span>10</span></div>
  <div class="stat">TYPE<span style="font-size:.6rem">CTRL-REV</span></div>
</div>
<div class="special-box">
  <h3>🃏 SPECIAL: MIRROR SHOT</html3>
  반전된 키보드 화살표를 머리에 달고 다님. 조종반전 투사체를 발사할 때 자신의 이동 방향도 일시적으로 반전됨.
</div>
<button class="btn" id="btn">🃏 미러 샷</button>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=420,H=300;
let t=0,mx=180,my=150,charging=false,chargeT=0,attackCD=4;
const px=350,py=150;
let bullets=[],mirrorT=0,mirrored=false;

function fire(){
  const dx=px-mx,dy=py-my,d=Math.sqrt(dx*dx+dy*dy)||1;
  bullets.push({x:mx,y:my,vx:dx/d*150,vy:dy/d*150,life:2.5,spin:0});
  mirrored=true;mirrorT=0;charging=false;chargeT=0;
}

function drawJester(x,y){
  ctx.save();ctx.translate(x,y);
  const bob=Math.sin(t*3)*4;ctx.translate(0,bob);

  // jester hat (3 tips with bells)
  const hatCols=['#cc44ff','#ff44cc','#44ccff'];
  [[-18,-45],[-2,-60],[14,-45]].forEach(([hx,hy],i)=>{
    const tipX=hx+(i-1)*12;
    ctx.beginPath();ctx.moveTo(-8,hy+14);ctx.lineTo(tipX,hy);ctx.lineTo(hx+16,hy+14);ctx.closePath();
    ctx.fillStyle=hatCols[i];ctx.fill();ctx.strokeStyle='#8833aa';ctx.lineWidth=1.5;ctx.stroke();
    // bell
    ctx.fillStyle='#ffee44';ctx.strokeStyle='#cc9900';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(tipX,hy-4,4,0,Math.PI*2);ctx.fill();ctx.stroke();
    // reversed arrow
    ctx.fillStyle='#ff2288';ctx.font='8px sans-serif';ctx.textAlign='center';
    const arrows=['↓','←','→'];ctx.fillText(arrows[i],tipX,hy-2);
  });

  // head
  const hg=ctx.createRadialGradient(-6,-22,4,0,-20,26);
  hg.addColorStop(0,charging?'#ff88ff':'#cc66ff');hg.addColorStop(1,charging?'#770099':'#440066');
  ctx.beginPath();ctx.ellipse(0,-20,24,22,0,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
  ctx.strokeStyle='#cc44ff';ctx.lineWidth=2;ctx.stroke();

  // face - mirrored features
  // eyes (one up, one down - mismatched)
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-9,-20,6,7,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(9,-20,6,7,-0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#110022';ctx.beginPath();ctx.ellipse(-9,-20,3,4,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(9,-20,3,4,-0.3,0,Math.PI*2);ctx.fill();
  // mismatched pupils
  ctx.fillStyle='#ff44ff';ctx.beginPath();ctx.arc(-7,-22,1.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#44ffff';ctx.beginPath();ctx.arc(11,-18,1.5,0,Math.PI*2);ctx.fill();

  // zigzag mouth (≠)
  ctx.strokeStyle='#ffee44';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-12,-8);ctx.lineTo(-4,-3);ctx.lineTo(4,-8);ctx.lineTo(12,-3);ctx.stroke();
  ctx.fillStyle='#ffee44';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('!=',0,-5);

  // body (diamond)
  ctx.beginPath();ctx.moveTo(0,5);ctx.lineTo(22,22);ctx.lineTo(0,42);ctx.lineTo(-22,22);ctx.closePath();
  const bg=ctx.createRadialGradient(0,22,3,0,22,25);
  bg.addColorStop(0,'#ee88ff');bg.addColorStop(0.5,'#8833cc');bg.addColorStop(1,'#330055');
  ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle='#cc44ff';ctx.lineWidth=2;ctx.stroke();
  // ↕ on body
  ctx.fillStyle='#ffeeaa';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('↕',0,27);

  // charge glow
  if(charging){
    ctx.globalAlpha=0.3+chargeT/0.7*0.4;ctx.fillStyle='#ff44ff';
    ctx.beginPath();ctx.arc(0,0,50,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }

  // mirror effect when mirrored
  if(mirrored){
    ctx.globalAlpha=0.3;ctx.strokeStyle='#44ffff';ctx.lineWidth=3;ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.moveTo(-40,-50);ctx.lineTo(-40,50);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  }
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0014';ctx.fillRect(0,0,W,H);
  const glow=ctx.createRadialGradient(mx,my,10,mx,my,140);
  glow.addColorStop(0,'rgba(200,100,255,0.07)');glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);

  // bullets
  bullets=bullets.filter(b=>b.life>0);
  bullets.forEach(b=>{
    b.x+=b.vx*0.016;b.y+=b.vy*0.016;b.life-=0.02;b.spin+=0.2;
    ctx.save();ctx.globalAlpha=b.life;ctx.translate(b.x,b.y);ctx.rotate(b.spin);
    const bg=ctx.createRadialGradient(0,0,2,0,0,15);
    bg.addColorStop(0,'#ff88ff');bg.addColorStop(1,'rgba(200,0,255,0)');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,15,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('↔',0,4);
    ctx.restore();
  });

  drawJester(mx,my);

  // mirrored status
  if(mirrored){
    ctx.fillStyle='#ff44ff';ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillText('↔ CONTROLS REVERSED',mx,my-90);
  }

  ctx.save();ctx.globalAlpha=0.6;ctx.fillStyle='#4a90d9';
  ctx.beginPath();ctx.arc(px,py,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=1;
  ctx.fillText('JY',px,py);ctx.restore();
  ctx.fillStyle='#cc66ff';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('InputMismatch',mx,my-105);
}

function update(dt){
  t+=dt;
  if(mirrored){mirrorT+=dt;if(mirrorT>2)mirrored=false;}
  if(charging){chargeT+=dt;if(chargeT>=0.7)fire();return;}
  attackCD-=dt;if(attackCD<=0){charging=true;chargeT=0;attackCD=4;}
  const dx=px-mx,dy=py-my,d=Math.sqrt(dx*dx+dy*dy);
  const dirMult=mirrored?-1:1;
  if(d>65){mx+=dirMult*dx/d*60*dt;my+=dirMult*dy/d*60*dt;}
  mx=Math.max(30,Math.min(W-30,mx));my=Math.max(30,Math.min(H-30,my));
}

document.getElementById('btn').addEventListener('click',()=>{if(!charging){charging=true;chargeT=0;attackCD=4;}});
let last=0;
function loop(ts){const dt=Math.min((ts-last)/1000,0.05);last=ts;update(dt);draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
</body></html>
