<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>김지윤의 디버그 서바이벌 — UI 스크린 레퍼런스</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f4f0; font-family: 'JetBrains Mono', monospace; }

  .print-page {
    width: 277mm;
    min-height: 190mm;
    background: #f5f4f0;
    padding: 10mm 12mm 8mm;
    break-before: page;
    page-break-before: always;
  }
  .print-page:first-child { break-before: avoid; page-break-before: avoid; }

  .page-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 8mm;
    padding-bottom: 4px;
    border-bottom: 1.5px solid #1e1e1e;
  }
  .page-title {
    font-size: 14px;
    font-weight: 700;
    color: #1e1e1e;
    letter-spacing: -0.3px;
  }
  .page-subtitle {
    font-size: 9px;
    color: #888;
  }
  .page-num {
    margin-left: auto;
    font-size: 9px;
    color: #aaa;
  }

  .artboard-row {
    display: flex;
    gap: 6mm;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .artboard-slot {
    display: flex;
    flex-direction: column;
    gap: 4px;
    break-inside: avoid;
  }

  .artboard-label {
    font-size: 8px;
    color: #666;
    letter-spacing: 0.3px;
    padding-left: 2px;
  }

  /* scale wrapper: artboard is 280×420, scaled to fit */
  .artboard-scale-wrap {
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.08);
  }
  .artboard-inner {
    transform-origin: top left;
  }

  /* 3-up row: scale ~0.76 → slot 213×319 */
  .row-3 .artboard-scale-wrap { width: 213px; height: 319px; }
  .row-3 .artboard-inner { width: 280px; height: 420px; transform: scale(0.761); }

  /* 2-up row: scale ~0.98 → slot 274×411 */
  .row-2 .artboard-scale-wrap { width: 274px; height: 411px; }
  .row-2 .artboard-inner { width: 280px; height: 420px; transform: scale(0.978); }

  /* 2x2 grid for 4-up */
  .row-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6mm; }
  .row-2x2 .artboard-scale-wrap { width: 213px; height: 319px; }
  .row-2x2 .artboard-inner { width: 280px; height: 420px; transform: scale(0.761); }

  @media print {
    @page { size: A4 landscape; margin: 0; }
    body { background: #f5f4f0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .print-page { margin: 0; padding: 10mm 12mm 8mm; }
    @keyframes pulse { from{opacity:0.4} to{opacity:1} }
  }

  @keyframes pulse { from{opacity:0.4} to{opacity:1} }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const T = {
  bg:'#1e1e1e', sidebar:'#252526', panel:'#2d2d2d', border:'#3e3e3e',
  teal:'#4ec9b0', red:'#f44747', orange:'#ce9178', yellow:'#dcdcaa',
  blue:'#9cdcfe', green:'#b5cea8', comment:'#6a9955', status:'#007acc',
  white:'#d4d4d4', dim:'#858585', dimmer:'#3e3e3e',
  mono:"'JetBrains Mono', monospace",
};

function WinChrome({ title, children, statusLeft, statusRight, noStatus }) {
  return (
    <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', background:T.bg, fontFamily:T.mono }}>
      <div style={{ background:'#323233', padding:'6px 10px', display:'flex', alignItems:'center', gap:6, borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
        <span style={{ width:9, height:9, borderRadius:'50%', background:'#f55', display:'inline-block' }}/>
        <span style={{ width:9, height:9, borderRadius:'50%', background:'#fb0', display:'inline-block' }}/>
        <span style={{ width:9, height:9, borderRadius:'50%', background:'#5c5', display:'inline-block' }}/>
        <span style={{ marginLeft:8, fontSize:9, color:'#999', letterSpacing:0.3 }}>{title}</span>
      </div>
      <div style={{ flex:1, overflow:'hidden', position:'relative' }}>{children}</div>
      {!noStatus && (
        <div style={{ background:T.status, height:20, padding:'0 10px', display:'flex', alignItems:'center', gap:14, fontSize:8, color:'rgba(255,255,255,0.9)', flexShrink:0 }}>
          <span>{statusLeft || '⎇  main'}</span>
          <span style={{ marginLeft:'auto' }}>{statusRight || 'Stage 1 · Python 기초'}</span>
        </div>
      )}
    </div>
  );
}

function PixelChar({ size=32, color='#4ec9b0' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" style={{ imageRendering:'pixelated', display:'block' }}>
      <rect x="4" y="1" width="8" height="3" fill="#2a1200"/>
      <rect x="3" y="2" width="1" height="4" fill="#2a1200"/>
      <rect x="12" y="2" width="1" height="4" fill="#2a1200"/>
      <rect x="4" y="4" width="8" height="6" fill="#ffd09b"/>
      <rect x="5" y="6" width="2" height="2" fill="#1e1e1e"/>
      <rect x="9" y="6" width="2" height="2" fill="#1e1e1e"/>
      <rect x="6" y="9" width="4" height="1" fill="#d4826a"/>
      <rect x="5" y="10" width="6" height="4" fill={color}/>
      <rect x="3" y="11" width="2" height="3" fill={color}/>
      <rect x="11" y="11" width="2" height="3" fill={color}/>
      <rect x="5" y="12" width="6" height="2" fill="#111"/>
      <rect x="6" y="13" width="4" height="1" fill="#4ec9b0" opacity="0.7"/>
    </svg>
  );
}

function PixelBoss({ size=40 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" style={{ imageRendering:'pixelated', display:'block' }}>
      <rect x="3" y="0" width="2" height="3" fill="#1a0a00"/>
      <rect x="6" y="0" width="1" height="2" fill="#1a0a00"/>
      <rect x="9" y="0" width="1" height="2" fill="#1a0a00"/>
      <rect x="11" y="0" width="2" height="3" fill="#1a0a00"/>
      <rect x="4" y="1" width="8" height="3" fill="#1a0a00"/>
      <rect x="4" y="4" width="8" height="6" fill="#ffd09b"/>
      <rect x="5" y="5" width="2" height="1" fill="#1e1e1e"/>
      <rect x="9" y="5" width="2" height="1" fill="#1e1e1e"/>
      <rect x="5" y="6" width="2" height="2" fill="#1e1e1e"/>
      <rect x="9" y="6" width="2" height="2" fill="#1e1e1e"/>
      <rect x="4" y="4" width="3" height="1" fill="#8B4513"/>
      <rect x="9" y="4" width="3" height="1" fill="#8B4513"/>
      <rect x="5" y="9" width="1" height="1" fill="#d4826a"/>
      <rect x="6" y="10" width="4" height="1" fill="#d4826a"/>
      <rect x="10" y="9" width="1" height="1" fill="#d4826a"/>
      <rect x="4" y="10" width="8" height="4" fill="#c0392b"/>
      <rect x="2" y="11" width="2" height="3" fill="#c0392b"/>
      <rect x="12" y="11" width="2" height="3" fill="#c0392b"/>
      <rect x="6" y="11" width="4" height="1" fill="#e74c3c"/>
    </svg>
  );
}

function PixelClassmate({ size=40, hairColor='#8B4513', shirtColor='#5c7cfa', expression='panic' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" style={{ imageRendering:'pixelated', display:'block' }}>
      <rect x="4" y="1" width="8" height="4" fill={hairColor}/>
      <rect x="3" y="2" width="1" height="5" fill={hairColor}/>
      <rect x="12" y="2" width="1" height="5" fill={hairColor}/>
      <rect x="5" y="0" width="6" height="2" fill={hairColor}/>
      <rect x="4" y="5" width="8" height="5" fill="#ffd09b"/>
      {expression === 'panic' ? <>
        <rect x="5" y="6" width="2" height="3" fill="#1e1e1e"/>
        <rect x="9" y="6" width="2" height="3" fill="#1e1e1e"/>
        <rect x="5" y="6" width="1" height="1" fill="#fff" opacity="0.5"/>
        <rect x="9" y="6" width="1" height="1" fill="#fff" opacity="0.5"/>
        <rect x="12" y="5" width="1" height="2" fill="#9cdcfe" opacity="0.8"/>
        <rect x="5" y="9" width="1" height="1" fill="#c0705a"/>
        <rect x="7" y="10" width="2" height="1" fill="#c0705a"/>
        <rect x="10" y="9" width="1" height="1" fill="#c0705a"/>
      </> : <>
        <rect x="5" y="7" width="2" height="2" fill="#1e1e1e"/>
        <rect x="9" y="7" width="2" height="2" fill="#1e1e1e"/>
        <rect x="6" y="9" width="4" height="1" fill="#c0705a"/>
      </>}
      <rect x="4" y="10" width="8" height="4" fill={shirtColor}/>
      <rect x="2" y="11" width="2" height="3" fill={shirtColor}/>
      <rect x="12" y="11" width="2" height="3" fill={shirtColor}/>
      <rect x="6" y="11" width="4" height="2" fill="#fff" opacity="0.15"/>
    </svg>
  );
}

function BugToken({ type='syntax', c=T.red }) {
  const labels = { syntax:'SyntaxError', null:'NullPointerException', seg:'SegFault', heal:'HealBug', env:'EnvError', indent:'IndentationError' };
  return (
    <div style={{ display:'inline-block', padding:'1px 5px', background:`${c}18`, border:`1px solid ${c}44`, borderRadius:2, fontSize:8, color:c, fontFamily:T.mono, whiteSpace:'nowrap' }}>
      {labels[type] || type}
    </div>
  );
}

function HpBar({ current=67, max=100, width=80 }) {
  const pct = Math.round(current/max*100);
  const color = pct > 60 ? T.teal : pct > 30 ? T.yellow : T.red;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
      <div style={{ width, height:5, background:'#333', borderRadius:1, overflow:'hidden' }}>
        <div style={{ width:`${pct}%`, height:'100%', background:color }}/>
      </div>
      <span style={{ fontSize:8, color, fontFamily:T.mono }}>{current}/{max}</span>
    </div>
  );
}

// ── ALL SCREENS ────────────────────────────────────────────────

function TitleScreen() {
  const boot = [
    { c:T.comment, t:'# debug-survival v1.0.0 — SSAFY 15기 서울 6반' },
    { c:T.dim,     t:'Initializing runtime...' },
    { c:T.green,   t:'[OK] Player loaded: 김지윤 (HP 100, SPD 1.0x)' },
    { c:T.green,   t:'[OK] Stage 1 assets ready' },
    { c:T.yellow,  t:'[WARN] Multiple bugs detected in vicinity' },
    { c:T.red,     t:'[CRIT] SyntaxError swarm incoming (×47)' },
  ];
  return (
    <WinChrome title="debug-survival — zsh" statusLeft="⎇  main" statusRight="김지윤 · HP 100">
      <div style={{ height:'100%', display:'flex', flexDirection:'column', padding:'14px 16px', overflow:'hidden' }}>
        <div style={{ fontSize:6, color:T.teal, lineHeight:1.6, letterSpacing:0.5, marginBottom:12, opacity:0.9 }}>
          {['██████╗ ███████╗██████╗ ██╗   ██╗ ██████╗','██╔══██╗██╔════╝██╔══██╗██║   ██║██╔════╝','██║  ██║█████╗  ██████╔╝██║   ██║██║  ███╗','██║  ██║██╔══╝  ██╔══██╗██║   ██║██║   ██║','██████╔╝███████╗██████╔╝╚██████╔╝╚██████╔╝'].map((l,i)=><div key={i}>{l}</div>)}
        </div>
        <div style={{ fontSize:7, color:T.blue, letterSpacing:1, marginBottom:14 }}>
          <span style={{ color:T.dim }}>//</span> 김지윤의 디버그 서바이벌
        </div>
        <div style={{ flex:1, overflow:'hidden' }}>
          {boot.map((l,i)=>(
            <div key={i} style={{ fontSize:8, color:l.c, lineHeight:2, display:'flex', gap:8 }}>
              <span style={{ color:T.dim, flexShrink:0 }}>{String(i+1).padStart(2,'0')}</span>
              <span>{l.t}</span>
            </div>
          ))}
        </div>
        <div style={{ marginTop:10, paddingTop:10, borderTop:`1px solid ${T.border}` }}>
          <div style={{ fontSize:9, color:T.white }}>
            <span style={{ color:T.teal }}>jiyoon@ssafy</span>
            <span style={{ color:T.dim }}>:</span>
            <span style={{ color:T.blue }}>~/stage1</span>
            <span style={{ color:T.dim }}>$ </span>
            game.start()<span style={{ color:T.white }}>█</span>
          </div>
          <div style={{ marginTop:8, fontSize:8, color:T.dim }}>
            press <span style={{ color:T.yellow, border:`1px solid ${T.border}`, padding:'1px 4px' }}>ENTER</span> to run
          </div>
        </div>
      </div>
    </WinChrome>
  );
}

function WeaponSelect() {
  const weapons = [
    { id:'python', file:'Python.py',  desc:'360° 자동 투사체 (범위 넓음, 느림)', type:'파일 확장자: .py',  col:T.blue,   lv:'★★★ 입문 추천', active:true },
    { id:'c',      file:'C_Cpp.c',    desc:'전방 고속 단일 관통탄',              type:'파일 확장자: .c',   col:T.yellow, lv:'★★☆ 정밀형',   active:false },
    { id:'java',   file:'Java.class', desc:'주변 오비탈 오브젝트 자동 공격',     type:'파일 확장자: .java',col:T.orange, lv:'★★☆ 관리형',   active:false },
  ];
  const cur = weapons[0];
  return (
    <WinChrome title="weapon-select.js — Debug Survival" statusLeft="⎇  main" statusRight="Stage 1 시작">
      <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
        <div style={{ background:T.sidebar, borderBottom:`1px solid ${T.border}`, display:'flex', fontSize:8 }}>
          <div style={{ padding:'6px 12px', background:T.bg, borderRight:`1px solid ${T.border}`, color:T.white }}>weapon-select.js</div>
        </div>
        <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
          <div style={{ width:100, background:T.sidebar, borderRight:`1px solid ${T.border}`, padding:'8px 0', fontSize:8 }}>
            <div style={{ padding:'3px 10px', color:T.dim, letterSpacing:1, fontSize:7, marginBottom:4 }}>EXPLORER</div>
            <div style={{ padding:'2px 8px', color:T.dim, marginBottom:2 }}><span style={{ color:T.yellow }}>▾</span> weapons/</div>
            {weapons.map(w=>(
              <div key={w.id} style={{ padding:'4px 8px 4px 16px', background: w.active?'rgba(78,201,176,0.12)':'transparent', color:w.active?T.teal:T.dim, borderLeft:`2px solid ${w.active?T.teal:T.border}`, display:'flex', alignItems:'center', gap:5 }}>
                <span style={{ color:w.col, fontSize:9 }}>⬡</span> {w.file}
              </div>
            ))}
            <div style={{ padding:'2px 8px', color:T.dim, marginTop:6, opacity:0.4 }}><span style={{ color:T.yellow }}>▸</span> [locked ×5]</div>
          </div>
          <div style={{ flex:1, padding:'12px 14px', overflow:'hidden' }}>
            <div style={{ fontSize:8, lineHeight:1.9, color:T.white }}>
              <div><span style={{ color:T.dim }}>1  </span><span style={{ color:T.blue }}>import</span> <span style={{ color:T.white }}>Weapon</span> <span style={{ color:T.blue }}>from</span> <span style={{ color:T.orange }}>'{cur.file}'</span></div>
              <div><span style={{ color:T.dim }}>2  </span></div>
              <div><span style={{ color:T.dim }}>3  </span><span style={{ color:T.comment }}>/** {cur.desc} */</span></div>
              <div><span style={{ color:T.dim }}>4  </span><span style={{ color:T.blue }}>const</span> <span style={{ color:T.teal }}> weapon</span> <span style={{ color:T.dim }}>=</span> <span style={{ color:T.blue }}> new</span> <span style={{ color:T.yellow }}> Python</span><span style={{ color:T.white }}>()</span></div>
              <div><span style={{ color:T.dim }}>5  </span></div>
              <div><span style={{ color:T.dim }}>6  </span><span style={{ color:T.comment }}>// {cur.type}</span></div>
              <div><span style={{ color:T.dim }}>7  </span><span style={{ color:T.comment }}>// 추천도: {cur.lv}</span></div>
            </div>
            <div style={{ position:'absolute', bottom:28, left:108, right:0, padding:'0 14px' }}>
              <div style={{ background:`${T.teal}18`, border:`1px solid ${T.teal}`, padding:'8px 12px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontSize:8, color:T.teal }}>선택됨: <span style={{ color:T.white }}>Python.py</span></span>
                <div style={{ background:T.teal, color:T.bg, padding:'4px 12px', fontSize:8, fontWeight:700 }}>Stage 1 시작 →</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </WinChrome>
  );
}

function GameHUD() {
  return (
    <WinChrome title="stage1.run() — Debug Survival" statusLeft="● Stage 1: Python 기초" statusRight="Wave 3 · 02:34">
      <div style={{ height:'100%', display:'flex', overflow:'hidden' }}>
        <div style={{ width:108, background:T.sidebar, borderRight:`1px solid ${T.border}`, display:'flex', flexDirection:'column', padding:'8px 0' }}>
          <div style={{ padding:'6px 10px', borderBottom:`1px solid ${T.border}`, marginBottom:6 }}>
            <div style={{ fontSize:7, color:T.dim, marginBottom:4 }}>PLAYER</div>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}><PixelChar size={20} color={T.teal}/><span style={{ fontSize:8, color:T.white }}>김지윤</span></div>
            <HpBar current={67} max={100} width={76}/>
          </div>
          <div style={{ padding:'0 10px', marginBottom:8 }}>
            <div style={{ fontSize:7, color:T.dim, marginBottom:4 }}>STATS</div>
            {[{k:'SPD',v:'1.0x',c:T.blue},{k:'ATK',v:'1.2x',c:T.yellow},{k:'TIME',v:'02:34',c:T.orange}].map(s=>(
              <div key={s.k} style={{ display:'flex', justifyContent:'space-between', fontSize:8, marginBottom:2 }}>
                <span style={{ color:T.dim }}>{s.k}</span><span style={{ color:s.c }}>{s.v}</span>
              </div>
            ))}
          </div>
          <div style={{ padding:'0 10px', marginBottom:8, borderTop:`1px solid ${T.border}`, paddingTop:8 }}>
            <div style={{ fontSize:7, color:T.dim, marginBottom:4 }}>QUEST</div>
            <div style={{ fontSize:7, color:T.comment, marginBottom:3 }}>Q1: 버그 처치</div>
            <div style={{ width:'100%', height:3, background:'#333', marginBottom:3 }}><div style={{ width:'47%', height:'100%', background:T.teal }}/></div>
            <div style={{ fontSize:7, color:T.white }}>47 <span style={{ color:T.dim }}>/ 100</span></div>
          </div>
          <div style={{ padding:'0 10px', borderTop:`1px solid ${T.border}`, paddingTop:8 }}>
            <div style={{ fontSize:7, color:T.dim, marginBottom:4 }}>WEAPONS</div>
            {[{n:'Python.py',lv:3,active:true},{n:'Java.class',lv:1,active:true},{n:'[empty]',active:false},{n:'[empty]',active:false}].map((w,i)=>(
              <div key={i} style={{ fontSize:7, padding:'3px 6px', marginBottom:2, background:w.active?`${T.teal}14`:'transparent', borderLeft:`2px solid ${w.active?T.teal:T.border}`, display:'flex', justifyContent:'space-between', color:w.active?T.teal:T.dimmer }}>
                <span>{w.n}</span>{w.lv&&<span style={{ color:T.yellow }}>Lv{w.lv}</span>}
              </div>
            ))}
          </div>
        </div>
        <div style={{ flex:1, position:'relative', overflow:'hidden', background:T.bg, backgroundImage:`linear-gradient(${T.teal}08 1px,transparent 1px),linear-gradient(90deg,${T.teal}08 1px,transparent 1px)`, backgroundSize:'18px 18px' }}>
          {[{x:15,y:20,type:'syntax',c:T.red},{x:62,y:15,type:'null',c:'#d7ba7d'},{x:78,y:50,type:'syntax',c:T.red},{x:12,y:58,type:'seg',c:T.orange},{x:68,y:68,type:'null',c:'#d7ba7d'},{x:40,y:75,type:'syntax',c:T.red}].map((e,i)=>(
            <div key={i} style={{ position:'absolute', left:`${e.x}%`, top:`${e.y}%` }}><BugToken type={e.type} c={e.c}/></div>
          ))}
          {[[55,44],[59,40],[51,49],[63,42]].map(([x,y],i)=>(
            <div key={i} style={{ position:'absolute', left:`${x}%`, top:`${y}%`, width:4, height:4, background:T.teal, boxShadow:`0 0 6px ${T.teal}` }}/>
          ))}
          <div style={{ position:'absolute', left:'48%', top:'46%', transform:'translate(-50%,-50%)', textAlign:'center' }}>
