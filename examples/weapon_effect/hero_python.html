<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Effect: Python - Serpent Constrictor</title>
    <style>
        body { margin: 0; padding: 0; background: #050505; color: #44ff44; font-family: 'Outfit', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { position: relative; padding: 20px; background: rgba(68, 255, 68, 0.05); border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid rgba(68, 255, 68, 0.2); box-shadow: 0 0 100px rgba(0, 0, 0, 0.8); }
        canvas { border-radius: 16px; background: #000; cursor: crosshair; }
        .info { text-align: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 2.5rem; background: linear-gradient(90deg, #44ff44, #3776ab); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 6px; font-weight: 900; }
        p { opacity: 0.6; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <h1>Python: Serpent Constrictor</h1>
            <p>적을 휘감아 압착하는 유연하고 치명적인 뱀의 움직임</p>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        class Snake {
            constructor(x, y, tx, ty) {
                this.x = x; this.y = y; this.tx = tx; this.ty = ty;
                this.points = [];
                for(let i=0; i<30; i++) this.points.push({x: x, y: y});
                this.angle = Math.atan2(ty - y, tx - x);
                this.speed = 6;
                this.active = true;
                this.time = 0;
            }
            update() {
                this.time += 0.1;
                const wave = Math.sin(this.time) * 4;
                const vx = Math.cos(this.angle) * this.speed + Math.cos(this.angle + Math.PI/2) * wave;
                const vy = Math.sin(this.angle) * this.speed + Math.sin(this.angle + Math.PI/2) * wave;
                
                this.x += vx; this.y += vy;
                this.points.unshift({x: this.x, y: this.y});
                this.points.pop();

                if (Math.hypot(this.tx - this.x, this.ty - this.y) < 20) this.active = false;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 20; ctx.shadowColor = '#44ff44';
                
                // Draw Body
                for(let i = this.points.length - 1; i > 0; i--) {
                    const p1 = this.points[i]; const p2 = this.points[i-1];
                    const alpha = 1 - (i / this.points.length);
                    const width = (1 - (i / this.points.length)) * 12;
                    ctx.beginPath();
                    ctx.strokeStyle = i % 2 === 0 ? `rgba(68, 255, 68, ${alpha})` : `rgba(55, 118, 171, ${alpha})`;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }

                // Head Glow
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        const snakes = [];
        const enemies = [{x: 100, y: 100}, {x: 700, y: 100}, {x: 400, y: 300}, {x: 100, y: 500}, {x: 700, y: 500}];

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            enemies.forEach(e => {
                ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(e.x, e.y, 15, 0, Math.PI*2); ctx.fill();
            });
            if (Math.random() < 0.03) {
                const e = enemies[Math.floor(Math.random()*enemies.length)];
                snakes.push(new Snake(400, 300, e.x, e.y));
            }
            for (let i = snakes.length - 1; i >= 0; i--) {
                snakes[i].update(); snakes[i].draw();
                if (!snakes[i].active) snakes.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
