<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Attack Effect - Style 2: Recursive Join</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050a14;
            color: #00ccff;
            font-family: 'Outfit', 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            position: relative;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 204, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        canvas {
            border-radius: 12px;
            background: #000;
        }
        .info {
            margin-bottom: 20px;
            text-align: center;
        }
        h1 { 
            margin: 0; 
            font-size: 2rem; 
            font-weight: 800;
            background: linear-gradient(90deg, #00ccff, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
            letter-spacing: 4px; 
        }
        p { opacity: 0.6; font-size: 1rem; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <h1>SQL: Recursive Join</h1>
            <p>버그들 사이의 연관 관계를 추적하여 연쇄적으로 타격하는 재귀 쿼리</p>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        class Node {
            constructor(x, y, depth = 0) {
                this.x = x;
                this.y = y;
                this.depth = depth;
                this.children = [];
                this.life = 1.0;
                this.spawned = false;
            }
            update() {
                this.life -= 0.01;
                if (!this.spawned && this.life < 0.9 && this.depth < 3) {
                    this.spawned = true;
                    for(let i=0; i<2; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = 100 - this.depth * 20;
                        this.children.push(new Node(this.x + Math.cos(angle)*dist, this.y + Math.sin(angle)*dist, this.depth + 1));
                    }
                }
                this.children.forEach(c => c.update());
                return this.life > 0;
            }
            draw() {
                ctx.save();
                ctx.strokeStyle = `rgba(0, 204, 255, ${this.life})`;
                ctx.lineWidth = 2 / (this.depth + 1);
                
                this.children.forEach(c => {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(c.x, c.y);
                    ctx.stroke();
                    c.draw();
                });

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3 / (this.depth + 1), 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        const effects = [];
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.02) {
                effects.push(new Node(Math.random()*800, Math.random()*600));
            }

            for (let i = effects.length - 1; i >= 0; i--) {
                if (effects[i].update()) {
                    effects[i].draw();
                } else {
                    effects.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
