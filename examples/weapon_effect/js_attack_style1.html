<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Attack Effect - Style 1: Event Loop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #2c2c05 0%, #000 100%);
            color: #f7df1e;
            font-family: 'Outfit', 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            position: relative;
            padding: 20px;
            background: rgba(247, 223, 30, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(247, 223, 30, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        canvas {
            border-radius: 12px;
            background: #000;
        }
        .info {
            margin-bottom: 20px;
            text-align: center;
        }
        h1 { 
            margin: 0; 
            font-size: 2rem; 
            font-weight: 800;
            background: linear-gradient(90deg, #f7df1e, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
            letter-spacing: 4px; 
        }
        p { opacity: 0.6; font-size: 1rem; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <h1>JavaScript: Event Loop</h1>
            <p>비동기 콜백처럼 예측 불가능한 궤적으로 쏟아지는 자바스크립트 투사체</p>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        class CallbackProjectile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 3 + Math.random() * 4;
                this.curve = (Math.random() - 0.5) * 0.1;
                this.life = 1.0;
            }
            update() {
                this.angle += this.curve;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.life -= 0.005;
                return this.life > 0 && this.x > 0 && this.x < 800 && this.y > 0 && this.y < 600;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#f7df1e';
                ctx.fillStyle = '#f7df1e';
                ctx.fillRect(-5, -5, 10, 10);
                
                ctx.fillStyle = '#000';
                ctx.font = 'bold 8px Arial';
                ctx.fillText('JS', -5, 4);
                
                ctx.restore();
            }
        }

        const projectiles = [];
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.1) {
                projectiles.push(new CallbackProjectile(400, 300));
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                if (projectiles[i].update()) {
                    projectiles[i].draw();
                } else {
                    projectiles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
