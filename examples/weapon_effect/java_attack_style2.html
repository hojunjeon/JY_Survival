<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Attack Effect - Style 2: Garbage Collection</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #2c1a0a 0%, #0a0500 100%);
            color: #ffa500;
            font-family: 'Outfit', 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            position: relative;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 165, 0, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        canvas {
            border-radius: 12px;
            background: #000;
        }
        .info {
            margin-bottom: 20px;
            text-align: center;
        }
        h1 { 
            margin: 0; 
            font-size: 2rem; 
            font-weight: 800;
            background: linear-gradient(90deg, #ffa500, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
            letter-spacing: 4px; 
        }
        p { opacity: 0.6; font-size: 1rem; margin-top: 8px; }
        .controls {
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <h1>Garbage Collection</h1>
            <p>메모리 상의 불필요한 버그들을 한곳으로 모아 소멸시키는 정화의 소용돌이</p>
        </div>
        <canvas id="canvas"></canvas>
        <div class="controls">주변의 적들을 끌어당겨 정화하는 강력한 광역 제어 효과</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        class GCParticle {
            constructor() {
                this.reset();
            }
            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = 200 + Math.random() * 100;
                this.speed = 1 + Math.random() * 2;
                this.life = 1.0;
                this.size = 1 + Math.random() * 3;
            }
            update() {
                this.angle += 0.05;
                this.radius -= this.speed;
                if (this.radius < 5) {
                    this.reset();
                }
            }
            draw() {
                const x = 400 + Math.cos(this.angle) * this.radius;
                const y = 300 + Math.sin(this.angle) * this.radius;
                ctx.fillStyle = `rgba(255, 165, 0, ${this.radius/300})`;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
        }

        const particles = Array.from({length: 100}, () => new GCParticle());

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Core pulse
            const pulse = 20 + Math.sin(Date.now()*0.01) * 5;
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ffa500';
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(400, 300, pulse, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
