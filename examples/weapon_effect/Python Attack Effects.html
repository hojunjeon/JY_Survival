<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Python 공격 이펙트 개선안 3종</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f0eee9; }
canvas { display:block; }

<body>
<div id="root"></div>
<script type="text/babel">

// ── SHARED ─────────────────────────────────────────────────────
const T = {
  bg:'#1e1e1e', border:'#3e3e3e', teal:'#4ec9b0',
  mono:"'JetBrains Mono', monospace",
  pyBlue:'#3776ab', pyYellow:'#ffd43b',
};

// 플레이어 픽셀 SVG
function PixelChar({ size=28, color='#4ec9b0' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" style={{ imageRendering:'pixelated', display:'block', flexShrink:0 }}>
      <rect x="4" y="1" width="8" height="3" fill="#2a1200"/>
      <rect x="3" y="2" width="1" height="4" fill="#2a1200"/>
      <rect x="12" y="2" width="1" height="4" fill="#2a1200"/>
      <rect x="4" y="4" width="8" height="6" fill="#ffd09b"/>
      <rect x="5" y="6" width="2" height="2" fill="#1e1e1e"/>
      <rect x="9" y="6" width="2" height="2" fill="#1e1e1e"/>
      <rect x="6" y="9" width="4" height="1" fill="#d4826a"/>
      <rect x="5" y="10" width="6" height="4" fill={color}/>
      <rect x="3" y="11" width="2" height="3" fill={color}/>
      <rect x="11" y="11" width="2" height="3" fill={color}/>
      <rect x="5" y="12" width="6" height="2" fill="#111"/>
      <rect x="6" y="13" width="4" height="1" fill={T.teal} opacity="0.7"/>
    </svg>
  );
}

// 간단한 버그 픽셀
function PixelBug({ x, y, size=14, color='#f44747' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 8 8" style={{ imageRendering:'pixelated', position:'absolute', left:x-size/2, top:y-size/2, display:'block' }}>
      <rect x="3" y="0" width="2" height="2" fill={color}/>
      <rect x="2" y="2" width="4" height="2" fill={color}/>
      <rect x="1" y="4" width="6" height="2" fill={color}/>
      <rect x="2" y="6" width="1" height="2" fill={color}/>
      <rect x="5" y="6" width="1" height="2" fill={color}/>
    </svg>
  );
}

// 공통 게임 뷰 래퍼
function GameView({ children, label, color='#4ec9b0' }) {
  const W = 280, H = 380;
  const bugs = [
    {x:50, y:60}, {x:220, y:80}, {x:60, y:280},
    {x:210, y:290}, {x:130, y:50}, {x:40, y:170}, {x:240, y:180},
  ];
  return (
    <div style={{ width:W, height:H, background:T.bg, position:'relative', overflow:'hidden', fontFamily:T.mono }}>
      {/* 격자 배경 */}
      <div style={{
        position:'absolute', inset:0,
        backgroundImage:`linear-gradient(${color}06 1px,transparent 1px),linear-gradient(90deg,${color}06 1px,transparent 1px)`,
        backgroundSize:'20px 20px',
      }}/>
      {/* 버그들 */}
      {bugs.map((b,i)=>(
        <PixelBug key={i} x={b.x} y={b.y} color={i%2===0?'#f44747':'#ce9178'}/>
      ))}
      {/* 플레이어 중앙 */}
      <div style={{ position:'absolute', left:'50%', top:'50%', transform:'translate(-50%,-50%)' }}>
        <PixelChar size={32} color={color}/>
      </div>
      {/* 이펙트 레이어 */}
      {children}
      {/* 라벨 배지 */}
      <div style={{
        position:'absolute', bottom:8, left:8,
        background:'rgba(0,0,0,0.7)', border:`1px solid ${color}55`,
        padding:'3px 8px', fontSize:7, color, letterSpacing:1,
      }}>{label}</div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 디자인 A: SNAKE TRAIL — 꿈틀거리는 뱀 꼬리 잔상
// ══════════════════════════════════════════════════════════════

function SnakeTrailCanvas() {
  const canvasRef = React.useRef(null);
  const frameRef = React.useRef(0);
  const timeRef = React.useRef(0);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2;

    // 8방향 투사체
    const DIRS = 8;
    const bullets = Array.from({length:DIRS}, (_,i) => {
      const angle = (i/DIRS)*Math.PI*2;
      return { angle, dist:0, trail:[] };
    });

    const SPEED = 1.2;
    const MAX_DIST = 160;
    const TRAIL_LEN = 18;
    const PY_BLUE = '#4ec9b0';
    const PY_GLOW = '#4ec9b088';

    let raf;
    const loop = () => {
      timeRef.current += 0.04;
      const t = timeRef.current;

      ctx.clearRect(0,0,W,H);

      bullets.forEach(b => {
        b.dist += SPEED;
        if (b.dist > MAX_DIST) b.dist = 0;

        // 뱀 웨이브: 진행 방향에 수직으로 사인파 진동
        const perpX = -Math.sin(b.angle);
        const perpY = Math.cos(b.angle);
        const wave = Math.sin(b.dist * 0.18 + t * 2) * 5;

        const bx = cx + Math.cos(b.angle)*b.dist + perpX*wave;
        const by = cy + Math.sin(b.angle)*b.dist + perpY*wave;

        b.trail.push({x:bx, y:by, wave});
        if (b.trail.length > TRAIL_LEN) b.trail.shift();

        // 꼬리 그리기
        if (b.trail.length > 2) {
          for (let j=1; j<b.trail.length; j++) {
            const alpha = j/b.trail.length;
            const r = alpha * 3.5;
            const p = b.trail[j], pp = b.trail[j-1];

            ctx.beginPath();
            ctx.moveTo(pp.x, pp.y);
            ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = `rgba(78,201,176,${alpha*0.85})`;
            ctx.lineWidth = r;
            ctx.lineCap = 'round';
            ctx.stroke();
          }
        }

        // 투사체 헤드 — 뱀 눈처럼 두 점
        if (b.dist > 4) {
          // 글로우
          ctx.beginPath();
          ctx.arc(bx, by, 6, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(78,201,176,0.15)';
          ctx.fill();
          // 헤드
          ctx.beginPath();
          ctx.arc(bx, by, 3.5, 0, Math.PI*2);
          ctx.fillStyle = PY_BLUE;
          ctx.shadowColor = PY_BLUE;
          ctx.shadowBlur = 8;
          ctx.fill();
          ctx.shadowBlur = 0;
          // 눈 (방향 표시)
          const ex = bx + Math.cos(b.angle)*2;
          const ey = by + Math.sin(b.angle)*2;
          ctx.beginPath();
          ctx.arc(ex, ey, 1, 0, Math.PI*2);
          ctx.fillStyle = '#ffd43b';
          ctx.fill();
        }
      });

      // 발사 원 링
      const ringAlpha = 0.15 + 0.05*Math.sin(t*3);
      ctx.beginPath();
      ctx.arc(cx, cy, 22, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(78,201,176,${ringAlpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      raf = requestAnimationFrame(loop);
    };
    loop();
    return () => cancelAnimationFrame(raf);
  }, []);

  return (
    <canvas ref={canvasRef} width={280} height={380}
      style={{ position:'absolute', inset:0, pointerEvents:'none' }}/>
  );
}

// 충돌 이펙트 — 뱀 파편
function SnakeHitEffect({ x, y }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let t = 0;
    const shards = Array.from({length:8}, (_,i) => ({
      angle: (i/8)*Math.PI*2 + Math.random()*0.3,
      len: 6 + Math.random()*8,
      speed: 1.5 + Math.random()*1.5,
      dist: 0,
    }));
    let raf;
    const loop = () => {
      ctx.clearRect(0,0,280,380);
      t += 0.06;
      shards.forEach(s => { s.dist += s.speed; });
      if (t > 1.2) { cancelAnimationFrame(raf); return; }
      const alpha = Math.max(0, 1 - t/1.2);
      shards.forEach(s => {
        const sx = x + Math.cos(s.angle)*s.dist;
        const sy = y + Math.sin(s.angle)*s.dist;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(s.angle)*(s.dist-s.len), y + Math.sin(s.angle)*(s.dist-s.len));
        ctx.lineTo(sx, sy);
        ctx.strokeStyle = `rgba(78,201,176,${alpha})`;
        ctx.lineWidth = 2.5;
        ctx.stroke();
      });
      // 히트 플래시
      if (t < 0.3) {
        ctx.beginPath();
        ctx.arc(x, y, 8*(1-t/0.3), 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,212,59,${0.6*(1-t/0.3)})`;
        ctx.fill();
      }
      raf = requestAnimationFrame(loop);
    };
    loop();
    return () => cancelAnimationFrame(raf);
  }, []);
  return <canvas ref={canvasRef} width={280} height={380} style={{ position:'absolute', inset:0, pointerEvents:'none' }}/>;
}

function DesignA() {
  return (
    <GameView label="A · Snake Trail" color="#4ec9b0">
      <SnakeTrailCanvas/>
      <SnakeHitEffect x={50} y={60}/>
    </GameView>
  );
}

// ══════════════════════════════════════════════════════════════
// 디자인 B: ORBIT BURST — 오비탈 링에서 방사형 폭발
// ══════════════════════════════════════════════════════════════

function OrbitBurstCanvas() {
  const canvasRef = React.useRef(null);
  const timeRef = React.useRef(0);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2;

    const ORBIT_R = 26;
    const DIRS = 8;
    let bullets = [];
    let bursts = [];
    let lastShot = 0;
    const SHOT_INTERVAL = 18;

    const spawnBurst = () => {
      const angle = (Math.random())*Math.PI*2;
      const ox = cx + Math.cos(angle)*ORBIT_R;
      const oy = cy + Math.sin(angle)*ORBIT_R;
      bullets.push({
        x: ox, y: oy,
        vx: Math.cos(angle)*2.2,
        vy: Math.sin(angle)*2.2,
        life: 0,
        maxLife: 70,
        angle,
      });
      // 발사 시 파티클 폭발
      bursts.push({
        x: ox, y: oy,
        particles: Array.from({length:6}, (_,i) => {
          const a = angle + (i/6)*Math.PI*2*0.5 - Math.PI*0.25;
          return { vx:Math.cos(a)*(1+Math.random()*1.5), vy:Math.sin(a)*(1+Math.random()*1.5), life:0 };
        }),
        life: 0,
      });
    };

    let frame = 0;
    let orbitAngle = 0;
    let raf;

    const loop = () => {
      timeRef.current += 0.03;
      frame++;
      orbitAngle += 0.04;
      ctx.clearRect(0,0,W,H);

      // 자동 발사
      if (frame - lastShot > SHOT_INTERVAL) {
        spawnBurst();
        lastShot = frame;
      }

      // 오비탈 링 (회전하는 점선)
      for (let i=0; i<DIRS; i++) {
        const a = orbitAngle + (i/DIRS)*Math.PI*2;
        const ox = cx + Math.cos(a)*ORBIT_R;
        const oy = cy + Math.sin(a)*ORBIT_R;
        // 회전 도트
        ctx.beginPath();
        ctx.arc(ox, oy, 2, 0, Math.PI*2);
        ctx.fillStyle = `rgba(55,118,171,0.8)`;
        ctx.fill();
      }
      // 링
      ctx.beginPath();
      ctx.arc(cx, cy, ORBIT_R, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(55,118,171,0.2)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // 투사체
      bullets = bullets.filter(b => b.life < b.maxLife);
      bullets.forEach(b => {
        b.x += b.vx; b.y += b.vy;
        b.life++;
        const alpha = 1 - b.life/b.maxLife;

        // 꼬리 (페이드)
        const tailLen = 12;
        const tx = b.x - b.vx*tailLen;
        const ty = b.y - b.vy*tailLen;
        const grad = ctx.createLinearGradient(tx,ty,b.x,b.y);
        grad.addColorStop(0, `rgba(55,118,171,0)`);
        grad.addColorStop(1, `rgba(55,118,171,${alpha*0.9})`);
        ctx.beginPath();
        ctx.moveTo(tx, ty); ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 3;
        ctx.stroke();

        // 헤드
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3.5, 0, Math.PI*2);
        ctx.fillStyle = `rgba(55,118,171,${alpha})`;
        ctx.shadowColor = '#3776ab';
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;

        // 헤드 외곽 — 파이썬 노란 테두리
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3.5, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,212,59,${alpha*0.7})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      // 발사 버스트 파티클
      bursts = bursts.filter(b => b.life < 20);
      bursts.forEach(b => {
        b.life++;
        b.particles.forEach(p => {
          p.life++;
          const alpha = 1 - p.life/20;
          const px = b.x + p.vx * p.life;
          const py = b.y + p.vy * p.life;
          ctx.beginPath();
          ctx.arc(px, py, 1.5*(1-p.life/20)+0.5, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255,212,59,${alpha})`;
          ctx.fill();
        });
      });

      raf = requestAnimationFrame(loop);
    };
    loop();
    return () => cancelAnimationFrame(raf);
  }, []);

  return <canvas ref={canvasRef} width={280} height={380} style={{ position:'absolute', inset:0, pointerEvents:'none' }}/>;
}

// 충돌 이펙트 — 링 폭발
function OrbitHitCanvas({ x, y }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let t = 0;
    let raf;
    const pts = Array.from({length:10}, (_,i) => ({
      angle:(i/10)*Math.PI*2,
      spd: 1.2+Math.random()*1.2,
      dist:0,
    }));
    const loop = () => {
      ctx.clearRect(0,0,280,380);
      t += 0.05;
      if (t > 1.5) { cancelAnimationFrame(raf); return; }
      pts.forEach(p => { p.dist += p.spd; });
      const ringAlpha = Math.max(0, 1-t/1.5);

      // 충격파 링
      [1,2].forEach(i => {
        const r = t*30*i;
        if (r > 60) return;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(55,118,171,${ringAlpha * (1-i*0.3)})`;
        ctx.lineWidth = 2-i*0.5;
        ctx.stroke();
      });

      // 파편
      pts.forEach(p => {
        const px = x+Math.cos(p.angle)*p.dist;
        const py = y+Math.sin(p.angle)*p.dist;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,212,59,${ringAlpha})`;
        ctx.fill();
      });

      // 중심 플래시
      if (t < 0.4) {
        ctx.beginPath();
        ctx.arc(x, y, 10*(1-t/0.4), 0, Math.PI*2);
        ctx.fillStyle = `rgba(55,118,171,${0.5*(1-t/0.4)})`;
        ctx.fill();
      }
      raf = requestAnimationFrame(loop);
    };
    loop();
    return () => cancelAnimationFrame(raf);
  }, []);
  return <canvas ref={canvasRef} width={280} height={380} style={{ position:'absolute', inset:0, pointerEvents:'none' }}/>;
}

function DesignB() {
  return (
    <GameView label="B · Orbit Burst" color="#3776ab">
      <OrbitBurstCanvas/>
      <OrbitHitCanvas x={220} y={80}/>
    </GameView>
  );
}

// ══════════════════════════════════════════════════════════════
// 디자인 C: CODE SHARD — >>> 프롬프트 투사체 + 코드 파편 폭발
// ══════════════════════════════════════════════════════════════

function CodeShardCanvas() {
  const canvasRef = React.useRef(null);
  const timeRef = React.useRef(0);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2;

    const DIRS = 8;
    let bullets = [];
    let hits = [];
    let frame = 0;
    const INTERVAL = 16;

    const SNIPPETS = ['>>>', 'py', '()', '[]', '::', 'def', 'for', 'in'];

    const spawn = () => {
      for (let i=0; i<DIRS; i++) {
        const angle = (i/DIRS)*Math.PI*2;
        bullets.push({
          x: cx, y: cy,
          vx: Math.cos(angle)*2.0,
          vy: Math.sin(angle)*2.0,
          life:0, maxLife:75,
          angle, snippet: SNIPPETS[i],
          rot: angle,
        });
      }
    };

    const addHit = (x, y) => {
      hits.push({
        x, y, life:0,
        shards: Array.from({length:6}, (_,i)=>({
          text: SNIPPETS[Math.floor(Math.random()*SNIPPETS.length)],
          angle:(i/6)*Math.PI*2 + Math.random()*0.4,
          spd: 1.2+Math.random(),
          dist:0,
          rot: Math.random()*Math.PI,
        })),
      });
    };

    let raf;
    const loop = () => {
      frame++;
      ctx.clearRect(0,0,W,H);

      if (frame === 1 || frame % (INTERVAL*DIRS) === 0) spawn();

      // 발사 원
      const pulseR = 18 + 3*Math.sin(frame*0.1);
      ctx.beginPath();
      ctx.arc(cx, cy, pulseR, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(55,118,171,0.25)`;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3,5]);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.font = `bold 8px ${T.mono}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      bullets = bullets.filter(b => {
        b.x += b.vx; b.y += b.vy; b.life++;
        const alpha = 1 - b.life/b.maxLife;
        if (b.life === b.maxLife) {
          addHit(b.x, b.y);
          return false;
        }
        // 글로우 배경
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.shadowColor = '#3776ab';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#ffd43b';
        ctx.fillText(b.snippet, b.x, b.y);
        ctx.shadowBlur = 0;

        // 꼬리 텍스트 잔상
        for (let k=1; k<=3; k++) {
          ctx.globalAlpha = alpha * (1-k/4) * 0.4;
          ctx.fillStyle = '#4ec9b0';
          ctx.fillText(b.snippet, b.x - b.vx*k*3, b.y - b.vy*k*3);
        }
        ctx.restore();
        return true;
      });

      // 히트 이펙트
      hits = hits.filter(h => h.life < 30);
      hits.forEach(h => {
        h.life++;
        const baseAlpha = 1 - h.life/30;

        // 중심 플래시
        if (h.life < 8) {
          ctx.beginPath();
          ctx.arc(h.x, h.y, 12*(1-h.life/8), 0, Math.PI*2);
          ctx.fillStyle = `rgba(255,212,59,${0.5*(1-h.life/8)})`;
          ctx.fill();
        }

        h.shards.forEach(s => {
          s.dist += s.spd;
          const sx = h.x + Math.cos(s.angle)*s.dist;
          const sy = h.y + Math.sin(s.angle)*s.dist;
          ctx.save();
          ctx.globalAlpha = baseAlpha;
          ctx.translate(sx, sy);
          ctx.rotate(s.rot + h.life*0.1);
          ctx.font = `bold 7px ${T.mono}`;
          ctx.fillStyle = '#4ec9b0';
          ctx.fillText(s.text, 0, 0);
          ctx.restore();
        });

        // 충격파 링
        const r = h.life * 2.5;
        if (r < 50) {
          ctx.beginPath();
          ctx.arc(h.x, h.y, r, 0, Math.PI*2);
          ctx.strokeStyle = `rgba(55,118,171,${baseAlpha*0.5})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      });

      raf = requestAnimationFrame(loop);
    };
    loop();
    return () => cancelAnimationFrame(raf);
  }, []);

  return <canvas ref={canvasRef} width={280} height={380} style={{ position:'absolute', inset:0, pointerEvents:'none' }}/>;
}

function DesignC() {
  return (
    <GameView label="C · Code Shard  >>>  " color="#3776ab">
      <CodeShardCanvas/>
    </GameView>
  );
}

// ── INFO CARDS ─────────────────────────────────────────────────
function InfoCard({ letter, title, pros, impl, color }) {
  return (
    <div style={{
      background:'#252526', border:`1px solid ${color}44`,
      padding:'12px 14px', fontFamily:T.mono, fontSize:8,
      width:280,
    }}>
      <div style={{ display:'flex', alignItems:'baseline', gap:8, marginBottom:8 }}>
        <span style={{ fontSize:11, fontWeight:700, color }}>{letter}</span>
        <span style={{ fontSize:10, color:'#d4d4d4', fontWeight:600 }}>{title}</span>
      </div>
      <div style={{ color:'#6a9955', marginBottom:4 }}>// 특징</div>
      {pros.map((p,i)=>(
        <div key={i} style={{ color:'#b5cea8', lineHeight:1.8 }}>+ {p}</div>
      ))}
      <div style={{ color:'#6a9955', marginTop:8, marginBottom:4 }}>// 구현 포인트</div>
      <div style={{ color:'#858585', lineHeight:1.8 }}>{impl}</div>
    </div>
  );
}

// ── MAIN ───────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas>
      <DCSection id="preview" title="Python 공격 이펙트 개선안" subtitle="360° 자동 투사체 — 3가지 방향 탐색">

        <DCArtboard id="a-view" label="A · Snake Trail — 라이브" width={280} height={380}>
          <DesignA/>
        </DCArtboard>

        <DCArtboard id="b-view" label="B · Orbit Burst — 라이브" width={280} height={380}>
          <DesignB/>
        </DCArtboard>

        <DCArtboard id="c-view" label="C · Code Shard — 라이브" width={280} height={380}>
          <DesignC/>
        </DCArtboard>

      </DCSection>

      <DCSection id="info" title="구현 가이드" subtitle="각 방향의 특징 · 구현 포인트">

        <DCArtboard id="a-info" label="A · Snake Trail 설명" width={280} height={220}>
          <InfoCard
            letter="A" title="Snake Trail"
            color="#4ec9b0"
            pros={[
              '투사체에 사인파 웨이브 궤적 (수직 진동)',
              '꼬리: 이전 위치 배열로 선분 잔상',
              '헤드: 투명 파이썬 노란 눈 포인트',
              '충돌: 꼬리 파편 8방향 방사',
            ]}
            impl="Projectile.history[] 에 위치 저장 →\nCanvas lineTo() 로 두께 그라데이션 꼬리.\n추가 연산 최소, 기존 구조 그대로 유지."
          />
        </DCArtboard>

        <DCArtboard id="b-info" label="B · Orbit Burst 설명" width={280} height={220}>
          <InfoCard
            letter="B" title="Orbit Burst"
            color="#3776ab"
            pros={[
              '발사 원점: 플레이어 주변 오비탈 링',
              '발사 시 파이썬 노란 스파크 파티클',
              '투사체 헤드: 파란 원 + 노란 테두리',
              '충돌: 동심원 충격파 + 점 파편',
            ]}
            impl="WeaponBase.fire() 에서 angle별\norbit 오프셋 계산 후 spawn.\nParticleSystem 연동으로 burst 처리."
          />
        </DCArtboard>

        <DCArtboard id="c-info" label="C · Code Shard 설명" width={280} height={220}>
          <InfoCard
            letter="C" title="Code Shard  >>>"
            color="#ffd43b"
            pros={[
              '투사체 외형: >>> / def / for 등 코드 텍스트',
              '꼬리: 같은 텍스트 잔상 3단계 페이드',
              '충돌: 코드 조각이 회전하며 산산조각',
              '파이썬 고유 정체성 가장 강함',
            ]}
            impl="Canvas fillText() 로 텍스트 투사체.\nPixelRenderer 의 drawProjectile() 에\ntextMode 플래그 추가. 가장 독창적."
          />
        </DCArtboard>

      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
